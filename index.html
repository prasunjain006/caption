<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Universal AI Engine | One Tool, Every Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .master-card { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid #1e293b; }
        .glow-btn { background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: 0.3s; }
        .glow-btn:hover { box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); transform: scale(1.02); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-5xl w-full master-card p-10 rounded-[3rem] shadow-2xl">
        <div class="flex items-center justify-between mb-10">
            <h1 class="text-3xl font-black italic tracking-tighter">ULTIMATE <span class="text-blue-500">ENGINE</span></h1>
            <div class="flex space-x-2">
                <span class="w-3 h-3 bg-red-500 rounded-full"></span>
                <span class="w-3 h-3 bg-yellow-500 rounded-full"></span>
                <span class="w-3 h-3 bg-green-500 rounded-full"></span>
            </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-12">
            <div class="space-y-8">
                <div class="relative h-64 group">
                    <input type="file" id="fileInp" class="hidden" accept="image/*">
                    <div onclick="document.getElementById('fileInp').click()" class="h-full border-2 border-dashed border-slate-800 rounded-3xl flex flex-col items-center justify-center cursor-pointer group-hover:border-blue-500 transition-all bg-slate-900/30 overflow-hidden relative">
                        <img id="prev" class="hidden absolute inset-0 w-full h-full object-cover rounded-3xl opacity-60">
                        <i class="fas fa-plus-circle text-4xl text-slate-700 group-hover:text-blue-500 mb-2 z-10"></i>
                        <p class="text-xs font-bold text-slate-500 z-10 uppercase tracking-widest">Drop Any Ref (Photo/Doc)</p>
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="text-[10px] font-bold text-slate-500 tracking-[0.3em]">CONTEXT / COMMAND</label>
                    <textarea id="cmd" rows="5" class="w-full bg-black/50 border border-slate-800 rounded-2xl p-5 text-sm focus:border-blue-500 outline-none transition" placeholder="e.g. 'Write a roast for my friend's birthday' or 'Formal email for internship' or 'Viral Instagram caption for this outfit'"></textarea>
                </div>

                <button id="fire" class="glow-btn w-full py-5 rounded-2xl font-black text-sm tracking-widest flex items-center justify-center space-x-3">
                    <span>GENERATE MAGIC</span>
                    <i class="fas fa-bolt"></i>
                </button>
            </div>

            <div class="bg-black/40 rounded-[2rem] p-8 border border-slate-800 flex flex-col min-h-[400px]">
                <div class="flex justify-between items-center mb-6">
                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">AI Output Hub</p>
                    <i class="fas fa-robot text-slate-700"></i>
                </div>
                <div id="out" class="flex-grow text-slate-300 text-sm leading-relaxed whitespace-pre-line overflow-y-auto max-h-[450px] font-medium italic">
                    Tell me anything. I'll handle the platform, the tone, and the emojis. I'm built for everything.
                </div>
                <div class="mt-8 flex justify-end pt-4 border-t border-slate-800">
                    <button onclick="copy()" class="text-[10px] font-bold hover:text-white transition uppercase tracking-widest flex items-center">
                        <i class="far fa-copy mr-2"></i> COPY
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // FIXED KEY & MODEL logic 
        const API_KEY = "AIzaSyAI4jWds7kAREHPPS_4KAa1RxFvHwHk4OI"; 
        const genAI = new GoogleGenerativeAI(API_KEY);

        const fInp = document.getElementById('fileInp');
        const prev = document.getElementById('prev');
        const cmd = document.getElementById('cmd');
        const out = document.getElementById('out');
        const btn = document.getElementById('fire');

        fInp.onchange = () => {
            const [file] = fInp.files;
            if (file) {
                prev.src = URL.createObjectURL(file);
                prev.classList.remove('hidden');
            }
        };

        async function toPart(file) {
            const b64 = await new Promise(r => {
                const rd = new FileReader();
                rd.onloadend = () => r(rd.result.split(',')[1]);
                rd.readAsDataURL(file);
            });
            return { inlineData: { data: b64, mimeType: file.type } };
        }

        btn.onclick = async () => {
            const file = fInp.files[0];
            const text = cmd.value;
            if(!text && !file) return;

            out.innerHTML = "<div class='animate-pulse text-blue-400'>Analyzing intent... Orchestrating response...</div>";
            btn.disabled = true;

            try {
                // Using latest flash to prevent 404 
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash-latest" });
                
                let masterPrompt = `You are an All-Rounder Content Architect.
                Detect the user's intent from the context: ${text}.
                - If they want to wish someone, write a heartfelt birthday/anniversary message.
                - If it's for Instagram, provide 3 options (Witty, Short, Aesthetic) with emojis.
                - If it's professional, write a high-impact LinkedIn post or Email.
                - If it's a roast, be funny but safe.
                - If there's an image, incorporate visual details into the text.
                Always provide the best structure for the detected platform.`;

                const payload = [masterPrompt];
                if (file) payload.push(await toPart(file));

                const result = await model.generateContent(payload);
                out.innerText = result.response.text();
                out.classList.remove('italic');
            } catch (err) {
                out.innerText = "Error in System Matrix. Check API/Connection.";
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        };

        window.copy = () => {
            navigator.clipboard.writeText(out.innerText);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
