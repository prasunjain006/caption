<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate AI Engine | v2.0 Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-magic { background: linear-gradient(90deg, #2563eb, #7c3aed); transition: 0.3s; }
        .btn-magic:hover { box-shadow: 0 0 20px rgba(124, 58, 237, 0.4); transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-5xl w-full glass p-10 rounded-[2.5rem] shadow-2xl grid md:grid-cols-2 gap-10">
        
        <div class="space-y-6">
            <h1 class="text-2xl font-black italic tracking-tighter text-blue-400">ULTIMATE ENGINE</h1>
            
            <div class="h-56 border-2 border-dashed border-slate-800 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:bg-blue-500/5 transition relative overflow-hidden" onclick="document.getElementById('fileInp').click()">
                <input type="file" id="fileInp" class="hidden" accept="image/*">
                <img id="prev" class="hidden absolute inset-0 w-full h-full object-cover rounded-3xl opacity-50">
                <div id="upTxt" class="text-center z-10">
                    <i class="fas fa-camera text-3xl mb-2 text-slate-600"></i>
                    <p class="text-[10px] font-bold text-slate-500 tracking-widest">DROP PHOTO (OPTIONAL)</p>
                </div>
            </div>

            <textarea id="userInput" rows="5" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 text-sm focus:border-blue-500 outline-none" placeholder="Kya chahiye? (Bday wish, Insta caption, LinkedIn post, ya sirf gyan...)"></textarea>

            <button id="mainBtn" class="btn-magic w-full py-4 rounded-xl font-bold text-sm tracking-widest uppercase shadow-lg">
                Generate Magic <i class="fas fa-bolt ml-2"></i>
            </button>
        </div>

        <div class="flex flex-col h-full bg-black/40 rounded-3xl p-6 border border-slate-800">
            <p class="text-[10px] font-bold text-slate-500 mb-4 tracking-widest uppercase">AI Architect Response</p>
            <div id="finalOut" class="flex-grow text-sm leading-relaxed whitespace-pre-line overflow-y-auto max-h-[400px] text-slate-300">
                Waiting for your command...
            </div>
            <button onclick="copyIt()" class="mt-4 text-[10px] font-bold text-blue-400 hover:text-white uppercase flex items-center">
                <i class="far fa-copy mr-2"></i> Copy Results
            </button>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // UPDATED API KEY AND MODEL NAME TO FIX 404
        const API_KEY = "AIzaSyAI4jWds7kAREHPPS_4KAa1RxFvHwHk4OI"; 
        const genAI = new GoogleGenerativeAI(API_KEY);

        const fInp = document.getElementById('fileInp');
        const prev = document.getElementById('prev');
        const upTxt = document.getElementById('upTxt');
        const mainBtn = document.getElementById('mainBtn');
        const finalOut = document.getElementById('finalOut');

        fInp.onchange = () => {
            const [file] = fInp.files;
            if (file) {
                prev.src = URL.createObjectURL(file);
                prev.classList.remove('hidden');
                upTxt.classList.add('hidden');
            }
        };

        async function toBase64(file) {
            return new Promise(r => {
                const rd = new FileReader();
                rd.onloadend = () => r(rd.result.split(',')[1]);
                rd.readAsDataURL(file);
            });
        }

        mainBtn.onclick = async () => {
            const file = fInp.files[0];
            const text = document.getElementById('userInput').value;
            if(!text && !file) return alert("Kuch toh likh bhai!");

            finalOut.innerHTML = "<div class='animate-pulse'>AI is thinking... Hold on...</div>";
            mainBtn.disabled = true;

            try {
                // FIXED MODEL NAME: gemini-1.5-flash-latest fixes the 404 error
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash-latest" });
                
                let systemPrompt = `You are an All-Rounder Content Creator. 
                User Input: "${text}"
                Based on this, detect if it's for LinkedIn (professional), Instagram (trendy/emojis), a Birthday wish (warm/roast), or General info. 
                Provide a structured, high-quality response. If there's an image, describe it in the context of the post.`;

                const parts = [systemPrompt];
                if (file) {
                    parts.push({ inlineData: { data: await toBase64(file), mimeType: file.type } });
                }

                const result = await model.generateContent(parts);
                finalOut.innerText = result.response.text();
            } catch (err) {
                finalOut.innerText = "Dikaat ye hai: " + err.message + "\n\nTip: Make sure your API key is enabled for 'Generative Language API' in Google AI Studio.";
                console.error(err);
            } finally {
                mainBtn.disabled = false;
            }
        };

        window.copyIt = () => {
            navigator.clipboard.writeText(finalOut.innerText);
            alert("Copied!");
        }
    </script>
</body>
</html>
